<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="/assets/img/logo.png">
<link rel="manifest" href="/manifest.webmanifest">

<meta charset="UTF-8" />
<title>UPI QR Generator - Qscan</title>
<meta name="description" content="Generate UPI payment QR instantly. Accept payments via PhonePe, Google Pay, Paytm.">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="/assets/css/style.css" />

</head>

<body>

<header class="top-bar">
  <div class="brand">
    <span class="brand-text">Qscan</span>
  </div>

  <nav class="nav">
    <a href="/tools.html" class="nav-link">Tools</a>
    <a href="/" class="nav-link">Scan</a>
    <a href="/generator.html" class="nav-link">Generate</a>
  </nav>
</header>

<main class="main">

<section class="hero">
  <h1>UPI QR Generator</h1>
  <p class="hero-sub">Accept payments instantly anywhere</p>
</section>

<section class="generator-card">

  <!-- UPI ID -->
  <label class="label">UPI ID</label>
  <input id="upi" class="textarea" placeholder="example@upi" />

  <!-- NAME -->
  <label class="label" style="margin-top:12px;">Name</label>
  <input id="name" class="textarea" placeholder="Your name / business" />

  <!-- AMOUNT -->
  <label class="label" style="margin-top:12px;">Amount (optional)</label>
  <input id="amount" class="textarea" placeholder="Enter amount (₹)" type="number" />

  <!-- NOTE -->
  <label class="label" style="margin-top:12px;">Note (optional)</label>
  <input id="note" class="textarea" placeholder="Payment note" />

  <!-- BUTTON -->
  <div class="generator-controls">
    <button id="download-btn" disabled>Download</button>
  </div>

  <!-- OUTPUT -->
  <div id="qr-output" class="qr-output">
    <p class="qr-placeholder small">Your UPI QR will appear here</p>
  </div>

</section>

</main>

<footer class="footer"></footer>

<!-- QR LIBRARY (REQUIRED) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<!-- MAIN SCRIPT -->
<script src="/assets/js/script.js"></script>

</body>
</html>
