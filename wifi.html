<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="/assets/img/logo.png">
<link rel="manifest" href="/manifest.webmanifest">

<meta charset="UTF-8" />
<title>WiFi QR Generator - Qscan</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="/assets/css/style.css" />

</head>

<body>

<header class="top-bar">
  <div class="brand">
    <span class="brand-text">Qscan</span>
  </div>

  <nav class="nav">
    <a href="/tools.html" class="nav-link">Tools</a>
    <a href="/" class="nav-link">Scan</a>
    <a href="/generator.html" class="nav-link">Generate</a>
  </nav>
</header>

<main class="main">

<section class="hero">
  <h1>WiFi QR Generator</h1>
  <p class="hero-sub">Share WiFi instantly</p>
</section>

<section class="generator-card">

  <label class="label">Network Name (SSID)</label>
  <input id="ssid" class="textarea" placeholder="WiFi Name" />

  <label class="label" style="margin-top:12px;">Password</label>
  <input id="password" class="textarea" placeholder="WiFi Password" />

  <label class="label" style="margin-top:12px;">Security</label>
  <select id="security" class="textarea">
    <option value="WPA">WPA/WPA2</option>
    <option value="WEP">WEP</option>
    <option value="nopass">Open</option>
  </select>

  <div class="generator-controls">
    <button id="download-btn" disabled>Download</button>
  </div>

  <div id="qr-output" class="qr-output">
    <p class="qr-placeholder">Your WiFi QR will appear here</p>
  </div>

</section>

</main>

<footer class="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="/assets/js/script.js"></script>

</body>
</html>
